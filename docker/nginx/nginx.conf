# ============================================================
# MythicForge VTT — Nginx Configuration
# Optimized for WebSocket connections and large asset uploads
# ============================================================

worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 75s;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/x-font-ttf font/opentype image/svg+xml;

    # Upload size (maps can be large)
    client_max_body_size 100M;
    client_body_buffer_size 128k;
    client_body_timeout 60s;

    # Security headers
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # WebSocket upstream map
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    # Upstream server
    upstream mythicforge_backend {
        server server:3000;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────
    server {
        listen 80;
        server_name _;

        # AWS ALB health check
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS Main Server ─────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name _;

        # SSL — replace with your cert paths or use ACM via ALB
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_session_timeout 1d;
        ssl_session_cache   shared:SSL:50m;
        ssl_session_tickets off;

        # Modern TLS only
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # HSTS
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

        # ── WebSocket endpoint ─────────────────────────────────
        location /ws {
            proxy_pass http://mythicforge_backend;
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Long-lived WebSocket connections
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_connect_timeout 10s;

            # Disable buffering for real-time events
            proxy_buffering off;
            proxy_cache off;

            limit_conn conn 50;
        }

        # ── API endpoints ──────────────────────────────────────
        location /api/auth {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://mythicforge_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /api {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://mythicforge_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # API response caching for GET requests
            proxy_cache_valid 200 1m;
            proxy_cache_methods GET HEAD;
        }

        # ── File uploads ───────────────────────────────────────
        location /api/upload {
            limit_req zone=api burst=5 nodelay;
            client_max_body_size 100M;
            proxy_pass http://mythicforge_backend;
            proxy_http_version 1.1;
            proxy_request_buffering off;  # stream upload to server
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 120s;
        }

        # ── Static assets (served directly by nginx) ───────────
        location /assets {
            alias /app/public/assets;
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header Vary Accept-Encoding;
            access_log off;

            # Serve gzip pre-compressed if available
            gzip_static on;

            # Security: only serve media files
            location ~* \.(png|jpg|jpeg|gif|webp|svg|mp4|webm|mp3|ogg|wav|woff2|woff|ttf)$ {
                expires 30d;
            }
            location ~ \.(php|sh|exe)$ { deny all; }
        }

        location /uploads {
            alias /app/public/uploads;
            expires 7d;
            add_header Cache-Control "public";
            access_log off;

            location ~ \.(php|sh|exe|js|html)$ { deny all; }
        }

        # ── Health check (for ALB) ─────────────────────────────
        location /api/health {
            access_log off;
            proxy_pass http://mythicforge_backend;
            proxy_http_version 1.1;
        }

        # ── Frontend SPA ───────────────────────────────────────
        location / {
            proxy_pass http://mythicforge_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SPA fallback
            proxy_intercept_errors on;
            error_page 404 = @spa_fallback;
        }

        location @spa_fallback {
            proxy_pass http://mythicforge_backend;
        }
    }
}
